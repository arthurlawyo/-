<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>付款成功 - 開始下載</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .card { background-color: #1e293b; padding: 50px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); max-width: 500px; border-top: 5px solid #d97706; }
        h1 { color: #d97706; margin-bottom: 20px; }
        .spinner { margin: 30px auto; width: 40px; height: 40px; border: 4px solid rgba(217, 119, 6, 0.3); border-radius: 50%; border-top-color: #d97706; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .manual-link { color: #94a3b8; text-decoration: underline; font-size: 0.9rem; margin-top: 30px; display: inline-block; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎉 付款成功！秩序已建立。</h1>
        <p>感謝您的購買！系統正在為您準備《生理時鐘錨點懶人包》。</p>
        
        <div class="spinner"></div>
        <p id="status">檔案將在 2 秒後自動下載...</p>

        <a href="https://drive.google.com/uc?export=download&id=你的GoogleDrive檔案ID" id="downloadLink" class="manual-link">如果沒有自動下載，請點擊這裡手動下載</a>
    </div>

    <script>
        // 頁面載入後 2 秒自動點擊下載連結
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('status').innerText = "下載已啟動！請檢查您的下載資料夾。";
                document.getElementById('downloadLink').click();
            }, 2000);
        };
    </script>

</body>
</html>
